name: Build Desktop

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run project quality checks
        run: python scripts/quality_check.py

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: npm run build:win
            artifact: wandao-Windows-x64
          - name: macOS Apple-Silicon
            os: macos-14
            command: npm run build:mac:arm64
            artifact: wandao-macOS-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json

      - name: Install dependencies
        working-directory: wandao_electron
        run: npm ci

      - name: Build desktop package
        working-directory: wandao_electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GITHUB_TOKEN: ${{ github.token }}
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            wandao_electron/dist/*.exe
            wandao_electron/dist/*.zip
            wandao_electron/dist/*.blockmap
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Wandao ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: release-artifacts/*
