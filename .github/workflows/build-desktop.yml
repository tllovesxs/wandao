name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: npm run build:win
            artifact: wandao-Windows-x64
          - name: macOS Apple-Silicon
            os: macos-14
            command: npm run build:mac:arm64
            artifact: wandao-macOS-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json

      - name: Install dependencies
        working-directory: wandao_electron
        run: npm ci

      - name: Build desktop package
        working-directory: wandao_electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GITHUB_TOKEN: ${{ github.token }}
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            wandao_electron/dist/*.exe
            wandao_electron/dist/*.zip
            wandao_electron/dist/*.blockmap
          if-no-files-found: ignore
