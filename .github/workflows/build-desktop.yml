name: Build Desktop

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run project quality checks
        run: python scripts/quality_check.py

  package-smoke:
    name: PR Windows Package Smoke
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json
      - name: Install dependencies
        working-directory: wandao_electron
        run: npm ci

      - name: Build unpacked application
        working-directory: wandao_electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run prepare:python:win && npx electron-builder --win dir --publish never

      - name: Verify packaged Plugin v1 resources
        run: python scripts/package_smoke.py --resources wandao_electron/dist/win-unpacked/resources

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: npm run build:win
            artifact: wandao-Windows-x64
          - name: macOS Apple-Silicon
            os: macos-14
            command: npm run build:mac:arm64
            artifact: wandao-macOS-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json

      - name: Install dependencies
        working-directory: wandao_electron
        run: npm ci

      - name: Build desktop package
        working-directory: wandao_electron
        env:
          # This project currently publishes unsigned desktop artifacts. Keep
          # electron-builder from probing an unavailable macOS identity.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GITHUB_TOKEN: ${{ github.token }}
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            wandao_electron/dist/*.exe
            wandao_electron/dist/*.zip
            wandao_electron/dist/*.blockmap
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: find release-artifacts -type f

      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: release-artifacts
          format: spdx-json
          output-file: release-artifacts/wandao.spdx.json

      - name: Generate SHA-256 checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-artifacts/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Wandao ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: release-artifacts/*
