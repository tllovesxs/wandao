name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wandao_electron/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit npm lockfile
        working-directory: wandao_electron
        run: npm audit --package-lock-only --registry=https://registry.npmjs.org --audit-level=high
      - name: Audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit
          # evernote-backup 1.13.1 pins click==8.1.8.  PYSEC-2026-2132 is
          # reachable only through click.edit(), which neither Wandao nor
          # evernote-backup invokes.  Keep auditing every other advisory;
          # remove this narrowly-scoped exception when upstream releases a
          # compatible evernote-backup version with Click >= 8.3.3.
          python -m pip_audit -r requirements.txt --ignore-vuln PYSEC-2026-2132

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
