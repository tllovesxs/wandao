<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万能导 Wandao</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div>
        <h1>万能导 Wandao</h1>
        <p class="subtitle">让知识没有壁垒，多平台文档互转</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary header-button" id="btn-check-update" type="button">检查更新</button>
        <button class="btn-secondary header-button" id="btn-theme-toggle" type="button">夜间模式</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <details class="nav-group" open>
          <summary>导出</summary>
          <button class="nav-item active" data-tool="zsxq">知识星球导出</button>
          <button class="nav-item" data-tool="yuque">语雀导出</button>
          <button class="nav-item" data-tool="feishu-export">飞书导出</button>
          <button class="nav-item" data-tool="aliyun">阿里 Thoughts 导出</button>
          <button class="nav-item" data-tool="yinxiang">印象笔记导出</button>
          <button class="nav-item" data-tool="ima-export">ima 知识库导出</button>
        </details>
        <details class="nav-group" open>
          <summary>导入</summary>
          <button class="nav-item" data-tool="yuque-import">语雀 Markdown 导入</button>
          <button class="nav-item" data-tool="feishu-import">飞书 Markdown 导入</button>
          <button class="nav-item" data-tool="yinxiang-import">印象笔记 Markdown 导入</button>
          <button class="nav-item" data-tool="ima-import">ima 知识库导入</button>
        </details>
      </aside>

      <main class="app-main">
        <section class="update-banner" id="update-banner" hidden>
          <div>
            <strong id="update-title">发现新版本</strong>
            <p id="update-detail">可以前往 GitHub Releases 下载最新版。</p>
          </div>
          <div class="update-actions">
            <button class="btn-secondary" id="btn-open-release" type="button">打开下载页</button>
            <button class="btn-text" id="btn-dismiss-update" type="button">忽略</button>
          </div>
        </section>

        <section class="tool-heading">
          <h2 id="tool-title">知识星球任意项目/专栏导出</h2>
          <p id="tool-description">将知识星球内容导出为本地 Markdown 文件</p>
        </section>

        <div id="content-area"></div>

        <section class="progress-section" id="progress-section" hidden>
          <div class="progress-header">
            <span id="progress-title">准备中</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-detail" id="progress-detail">等待任务开始</div>
        </section>

        <section class="log-section">
          <div class="log-header">
            <h3>运行日志</h3>
            <div>
              <button class="btn-text" id="btn-settings">设置</button>
              <button class="btn-text" id="btn-about">关于</button>
              <button class="btn-text" id="btn-clear-log">清空</button>
            </div>
          </div>
          <div class="log-content" id="log-content"></div>
        </section>
      </main>
    </div>
  </div>

  <template id="template-zsxq">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-group">
          <label for="zsxq-url">知识星球入口 URL <span class="required">*</span></label>
          <input type="text" id="zsxq-url" placeholder="https://wx.zsxq.com/columns/...">
        </div>
        <div class="form-group">
          <label for="zsxq-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="zsxq-output" placeholder="留空使用默认 exports/zsxq">
            <button class="btn-secondary" id="zsxq-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="zsxq-max-depth">最多进入几层 URL</label>
                <input type="number" id="zsxq-max-depth" value="2" min="0">
              </div>
              <div class="form-group flex-1">
                <label for="zsxq-delay">请求延迟秒</label>
                <input type="number" id="zsxq-delay" value="1.0" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="zsxq-jitter">随机浮动秒</label>
                <input type="number" id="zsxq-jitter" value="0.5" min="0" step="0.1">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="zsxq-incremental" checked>
              <span>增量导出</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="zsxq-include-comments">
              <span>同时导出评论区</span>
            </label>
          </div>
        </details>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="zsxq-login">登录并保存凭证</button>
        <button class="btn-secondary login-done-button" id="zsxq-login-done" hidden>我已完成登录，保存凭证</button>
        <button class="btn-primary" id="zsxq-export">开始导出</button>
        <button class="btn-danger" id="zsxq-stop" disabled>停止</button>
        <button class="btn-secondary" id="zsxq-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-yuque">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-group">
          <label for="yuque-url">语雀知识库 URL <span class="required">*</span></label>
          <input type="text" id="yuque-url" placeholder="https://www.yuque.com/<namespace>/<book>">
        </div>
        <div class="form-group">
          <label for="yuque-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="yuque-output" placeholder="留空使用默认 exports/yuque">
            <button class="btn-secondary" id="yuque-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="yuque-delay">请求延迟秒</label>
                <input type="number" id="yuque-delay" value="0.8" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="yuque-jitter">随机浮动秒</label>
                <input type="number" id="yuque-jitter" value="0.4" min="0" step="0.1">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="yuque-incremental" checked>
              <span>增量导出</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="yuque-download-attachments" checked>
              <span>同时下载附件</span>
            </label>
          </div>
        </details>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="yuque-login">登录并保存凭证</button>
        <button class="btn-secondary login-done-button" id="yuque-login-done" hidden>我已完成登录，保存凭证</button>
        <button class="btn-primary" id="yuque-export">开始导出</button>
        <button class="btn-danger" id="yuque-stop" disabled>停止</button>
        <button class="btn-secondary" id="yuque-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-yuque-import">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-group">
          <label for="yuque-import-url">目标语雀知识库 URL <span class="required">*</span></label>
          <input type="text" id="yuque-import-url" placeholder="https://www.yuque.com/<namespace>/<book>">
        </div>
        <div class="form-group">
          <label for="yuque-import-output">Markdown 目录</label>
          <div class="input-with-button">
            <input type="text" id="yuque-import-output" placeholder="留空使用默认 exports/yuque">
            <button class="btn-secondary" id="yuque-import-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section" open>
          <summary>导入选项</summary>
          <div class="advanced-content">
            <label class="checkbox-label">
              <input type="checkbox" id="yuque-import-update-existing" checked>
              <span>已存在文档则更新</span>
            </label>
          </div>
        </details>
        <p class="helper-note">导入会按本地文件夹创建语雀目录，并上传 Markdown 中的本地图片和附件。凭证文件保存的是登录 Cookie，不保存密码。</p>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="yuque-import-login" type="button">登录并保存凭证</button>
        <button class="btn-secondary login-done-button" id="yuque-import-login-done" hidden>我已完成登录，保存凭证</button>
        <button class="btn-secondary" id="yuque-import-save-config" type="button">保存配置</button>
        <button class="btn-primary" id="yuque-import-plan" type="button">生成计划</button>
        <button class="btn-primary" id="yuque-import-one" type="button">单篇导入测试</button>
        <button class="btn-primary" id="yuque-import-export">批量导入</button>
        <button class="btn-danger" id="yuque-import-stop" disabled>停止</button>
        <button class="btn-secondary" id="yuque-import-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-feishu-export">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-group">
          <label for="feishu-export-url">飞书 Wiki URL <span class="required">*</span></label>
          <input type="text" id="feishu-export-url" placeholder="https://<tenant>.feishu.cn/wiki/<token>">
        </div>
        <div class="form-group">
          <label for="feishu-export-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="feishu-export-output" placeholder="留空使用默认 exports/feishu">
            <button class="btn-secondary" id="feishu-export-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="feishu-export-delay">请求延迟秒</label>
                <input type="number" id="feishu-export-delay" value="0.8" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="feishu-export-jitter">随机浮动秒</label>
                <input type="number" id="feishu-export-jitter" value="0.4" min="0" step="0.1">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="feishu-export-incremental" checked>
              <span>增量导出</span>
            </label>
          </div>
        </details>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="feishu-export-login">登录并保存凭证</button>
        <button class="btn-secondary login-done-button" id="feishu-export-login-done" hidden>我已完成登录，保存凭证</button>
        <button class="btn-primary" id="feishu-export-export">开始导出</button>
        <button class="btn-danger" id="feishu-export-stop" disabled>停止</button>
        <button class="btn-secondary" id="feishu-export-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-aliyun">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-group">
          <label for="aliyun-url">阿里云 Thoughts 工作区 URL <span class="required">*</span></label>
          <input type="text" id="aliyun-url" placeholder="https://thoughts.aliyun.com/workspaces/<id>/overview">
        </div>
        <div class="form-group">
          <label for="aliyun-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="aliyun-output" placeholder="留空使用默认 exports/aliyun-thoughts">
            <button class="btn-secondary" id="aliyun-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="aliyun-delay">请求延迟秒</label>
                <input type="number" id="aliyun-delay" value="0.8" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="aliyun-jitter">随机浮动秒</label>
                <input type="number" id="aliyun-jitter" value="0.4" min="0" step="0.1">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="aliyun-incremental" checked>
              <span>增量导出</span>
            </label>
          </div>
        </details>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="aliyun-login">登录并保存凭证</button>
        <button class="btn-secondary login-done-button" id="aliyun-login-done" hidden>我已完成登录，保存凭证</button>
        <button class="btn-primary" id="aliyun-export">开始导出</button>
        <button class="btn-danger" id="aliyun-stop" disabled>停止</button>
        <button class="btn-secondary" id="aliyun-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-yinxiang">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="yinxiang-username">印象笔记账号 <span class="required">*</span></label>
            <input type="text" id="yinxiang-username" placeholder="手机号 / 邮箱 / 用户名">
          </div>
          <div class="form-group flex-1">
            <label for="yinxiang-password">印象笔记密码 <span class="required">*</span></label>
            <input type="password" id="yinxiang-password" placeholder="仅用于本地初始化凭证">
          </div>
        </div>
        <div class="form-group">
          <label for="yinxiang-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="yinxiang-output" placeholder="留空使用默认 exports/yinxiang">
            <button class="btn-secondary" id="yinxiang-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <label class="checkbox-label">
              <input type="checkbox" id="yinxiang-incremental" checked>
              <span>增量导出</span>
            </label>
            <p class="helper-note">首次点击“登录并同步”会把印象笔记同步到本地，之后可读取目录并选择要导出的笔记。</p>
          </div>
        </details>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="yinxiang-login">登录并同步</button>
        <button class="btn-primary" id="yinxiang-export">开始导出</button>
        <button class="btn-danger" id="yinxiang-stop" disabled>停止</button>
        <button class="btn-secondary" id="yinxiang-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-yinxiang-import">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="yinxiang-import-username">印象笔记账号</label>
            <input type="text" id="yinxiang-import-username" placeholder="首次使用时填写">
          </div>
          <div class="form-group flex-1">
            <label for="yinxiang-import-password">印象笔记密码</label>
            <input type="password" id="yinxiang-import-password" placeholder="仅用于本地初始化凭证">
          </div>
        </div>
        <div class="form-group">
          <label for="yinxiang-import-source">Markdown 目录 <span class="required">*</span></label>
          <div class="input-with-button">
            <input type="text" id="yinxiang-import-source" placeholder="选择包含 Markdown 文件的目录">
            <button class="btn-secondary" id="yinxiang-import-browse-source">浏览</button>
          </div>
        </div>
        <div class="form-group">
          <label for="yinxiang-import-source-file">单篇测试文件（可选）</label>
          <div class="input-with-button">
            <input type="text" id="yinxiang-import-source-file" placeholder="留空则使用目录内第一篇">
            <button class="btn-secondary" id="yinxiang-import-browse-file">浏览</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="yinxiang-import-notebook">默认目标笔记本</label>
            <input type="text" id="yinxiang-import-notebook" value="万能导导入">
          </div>
          <div class="form-group flex-1">
            <label for="yinxiang-import-stack">默认笔记本组</label>
            <input type="text" id="yinxiang-import-stack" placeholder="可留空">
          </div>
        </div>
        <details class="advanced-section">
          <summary>导入选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="yinxiang-import-delay">请求延迟秒</label>
                <input type="number" id="yinxiang-import-delay" value="0.3" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="yinxiang-import-max">最多导入数量</label>
                <input type="number" id="yinxiang-import-max" value="0" min="0">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="yinxiang-import-preserve-folders" checked>
              <span>按本地目录创建笔记本组/笔记本</span>
            </label>
          </div>
        </details>
        <p class="helper-note">第一次使用先点击“登录并同步凭证”。导入会把 Markdown 正文、本地图片和附件写入印象笔记。</p>
      </section>
      <section class="action-section">
        <button class="btn-primary" id="yinxiang-import-login">登录并同步凭证</button>
        <button class="btn-primary" id="yinxiang-import-plan">扫描目录</button>
        <button class="btn-primary" id="yinxiang-import-one">单篇导入测试</button>
        <button class="btn-primary" id="yinxiang-import-export">批量导入</button>
        <button class="btn-danger" id="yinxiang-import-stop" disabled>停止</button>
        <button class="btn-secondary" id="yinxiang-import-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-ima-export">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="ima-export-client-id">ima Client ID <span class="required">*</span></label>
            <input type="text" id="ima-export-client-id" placeholder="从 ima API Key 页面获取">
          </div>
          <div class="form-group flex-1">
            <label for="ima-export-api-key">ima API Key <span class="required">*</span></label>
            <input type="password" id="ima-export-api-key" placeholder="只保存到本机配置">
          </div>
        </div>
        <div class="form-group">
          <label for="ima-export-output">输出目录</label>
          <div class="input-with-button">
            <input type="text" id="ima-export-output" placeholder="留空使用默认 exports/ima">
            <button class="btn-secondary" id="ima-export-browse-output">浏览</button>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导出选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="ima-export-kb-id">指定知识库 ID（可选）</label>
                <input type="text" id="ima-export-kb-id" placeholder="留空读取全部可访问知识库">
              </div>
              <div class="form-group flex-1">
                <label for="ima-export-delay">请求延迟秒</label>
                <input type="number" id="ima-export-delay" value="0.2" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="ima-export-jitter">随机浮动秒</label>
                <input type="number" id="ima-export-jitter" value="0.2" min="0" step="0.1">
              </div>
            </div>
          </div>
        </details>
        <p class="helper-note">先读取目录后可按知识库、文件夹或单个文件勾选导出。普通文件会尽量按原文件保存；ima 笔记类内容受官方 API 限制，会尽量导出为 Markdown 文本。</p>
      </section>
      <section class="action-section">
        <button class="btn-secondary" id="ima-export-save-config">保存 API 配置</button>
        <button class="btn-primary" id="ima-export-export">开始导出</button>
        <button class="btn-danger" id="ima-export-stop" disabled>停止</button>
        <button class="btn-secondary" id="ima-export-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <template id="template-ima-import">
    <div class="tool-panel">
      <section class="form-section">
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="ima-import-client-id">ima Client ID <span class="required">*</span></label>
            <input type="text" id="ima-import-client-id" placeholder="从 ima API Key 页面获取">
          </div>
          <div class="form-group flex-1">
            <label for="ima-import-api-key">ima API Key <span class="required">*</span></label>
            <input type="password" id="ima-import-api-key" placeholder="只保存到本机配置">
          </div>
        </div>
        <div class="form-group">
          <label for="ima-import-source">本地文件目录 <span class="required">*</span></label>
          <div class="input-with-button">
            <input type="text" id="ima-import-source" placeholder="选择要导入 ima 知识库的本地目录">
            <button class="btn-secondary" id="ima-import-browse-source">浏览</button>
          </div>
        </div>
        <div class="form-group">
          <label for="ima-import-source-file">单文件测试（可选）</label>
          <div class="input-with-button">
            <input type="text" id="ima-import-source-file" placeholder="留空则使用目录内第一个支持文件">
            <button class="btn-secondary" id="ima-import-browse-file">浏览</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="ima-import-kb-select">目标知识库 <span class="required">*</span></label>
            <select id="ima-import-kb-select">
              <option value="">先点击“读取知识库”</option>
            </select>
          </div>
          <div class="form-group flex-1">
            <label for="ima-import-folder-id">目标文件夹</label>
            <div class="input-with-button">
              <select id="ima-import-folder-id">
                <option value="">知识库根目录</option>
              </select>
              <button class="btn-secondary" id="ima-import-list-folders" type="button">读取文件夹</button>
            </div>
          </div>
        </div>
        <details class="advanced-section">
          <summary>导入选项</summary>
          <div class="advanced-content">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="ima-import-delay">请求延迟秒</label>
                <input type="number" id="ima-import-delay" value="0.2" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="ima-import-jitter">随机浮动秒</label>
                <input type="number" id="ima-import-jitter" value="0.2" min="0" step="0.1">
              </div>
              <div class="form-group flex-1">
                <label for="ima-import-max">最多导入数量</label>
                <input type="number" id="ima-import-max" value="0" min="0">
              </div>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="ima-import-skip-existing" checked>
              <span>目标已有同名文件时跳过</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="ima-import-include-assets">
              <span>将 Markdown 引用的本地图片/附件也作为独立文件上传</span>
            </label>
          </div>
        </details>
        <p class="helper-note">第一版使用 ima 知识库 OpenAPI 上传文件，支持 Markdown、PDF、Word、PPT、Excel、图片、TXT、Xmind、音频等文件。默认不会把 Markdown 引用的本地配图重复作为独立图片导入。官方 API 暂未提供明确的创建知识库文件夹接口，所以目前可导入到根目录或已有文件夹。</p>
      </section>
      <section class="action-section">
        <button class="btn-secondary" id="ima-import-save-config">保存 API 配置</button>
        <button class="btn-primary" id="ima-import-list-kbs">读取知识库</button>
        <button class="btn-primary" id="ima-import-plan">扫描目录</button>
        <button class="btn-primary" id="ima-import-one">单文件导入测试</button>
        <button class="btn-primary" id="ima-import-export">批量导入</button>
        <button class="btn-danger" id="ima-import-stop" disabled>停止</button>
        <button class="btn-secondary" id="ima-import-open-dir">打开目录</button>
      </section>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
